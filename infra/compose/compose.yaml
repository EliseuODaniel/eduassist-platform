name: ${COMPOSE_PROJECT_NAME:-eduassist-platform}

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17}
    container_name: eduassist-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eduassist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eduassist}
      POSTGRES_DB: ${POSTGRES_DB:-eduassist}
      POSTGRES_KEYCLOAK_DB: ${POSTGRES_KEYCLOAK_DB:-keycloak}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: eduassist-redis
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: eduassist-minio
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: eduassist-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123}; do sleep 2; done &&
      mc mb --ignore-existing local/${MINIO_BUCKET_DOCUMENTS:-documents}
      "
    restart: 'no'

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.1}
    container_name: eduassist-keycloak
    depends_on:
      postgres:
        condition: service_healthy
    command: ['start-dev', '--health-enabled=true', '--hostname-strict=false']
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-eduassist}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-eduassist}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD-SHELL', 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf "GET /realms/master HTTP/1.1\r\nHost: localhost\r\n\r\n" >&3 && grep -q "200" <&3']
      interval: 20s
      timeout: 10s
      retries: 15
    restart: unless-stopped

  opa:
    image: ${OPA_IMAGE:-openpolicyagent/opa:latest-static}
    container_name: eduassist-opa
    command: ['run', '--server', '--addr=0.0.0.0:8181', '/policies']
    ports:
      - '8181:8181'
    volumes:
      - ./opa:/policies:ro
    restart: unless-stopped

  api-core:
    build:
      context: ../..
      dockerfile: apps/api-core/Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-ghcr.io/astral-sh/uv:python3.12-bookworm-slim}
    container_name: eduassist-api-core
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8000
      DATABASE_URL: ${DATABASE_URL:-postgresql://eduassist:eduassist@postgres:5432/eduassist}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPA_URL: ${OPA_URL:-http://opa:8181}
    ports:
      - '${API_CORE_PORT:-8001}:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/healthz\")"']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ai-orchestrator:
    build:
      context: ../..
      dockerfile: apps/ai-orchestrator/Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-ghcr.io/astral-sh/uv:python3.12-bookworm-slim}
    container_name: eduassist-ai-orchestrator
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8000
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-2.5-pro}
    ports:
      - '${AI_ORCHESTRATOR_PORT:-8002}:8000'
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/healthz\")"']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  telegram-gateway:
    build:
      context: ../..
      dockerfile: apps/telegram-gateway/Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-ghcr.io/astral-sh/uv:python3.12-bookworm-slim}
    container_name: eduassist-telegram-gateway
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-change-me}
      API_CORE_URL: http://api-core:8000
    ports:
      - '${TELEGRAM_GATEWAY_PORT:-8003}:8000'
    depends_on:
      api-core:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/healthz\")"']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-ghcr.io/astral-sh/uv:python3.12-bookworm-slim}
    container_name: eduassist-worker
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql://eduassist:eduassist@postgres:5432/eduassist}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'test -f /tmp/worker-ready']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  admin-web:
    build:
      context: ../..
      dockerfile: apps/admin-web/Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:24-bookworm-slim}
    container_name: eduassist-admin-web
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: '1'
      PORT: 3000
      API_CORE_URL: http://api-core:8000
      AI_ORCHESTRATOR_URL: http://ai-orchestrator:8000
      TELEGRAM_GATEWAY_URL: http://telegram-gateway:8000
      KEYCLOAK_HOST: ${KEYCLOAK_HOST:-http://keycloak:8080}
      OPA_URL: ${OPA_URL:-http://opa:8181}
    ports:
      - '${ADMIN_WEB_PORT:-3000}:3000'
    depends_on:
      api-core:
        condition: service_healthy
      ai-orchestrator:
        condition: service_healthy
      telegram-gateway:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(\"http://127.0.0.1:3000\").then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"']
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
