      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-eduassist}
      KEYCLOAK_WEB_CLIENT_ID: ${KEYCLOAK_WEB_CLIENT_ID:-eduassist-web}
      ADMIN_WEB_PUBLIC_URL: ${ADMIN_WEB_PUBLIC_URL:-http://localhost:3000}
      OPA_URL: ${OPA_URL:-http://opa:8181}
    ports:
      - '${ADMIN_WEB_PORT:-3000}:3000'
    depends_on:
      api-core:
        condition: service_healthy
      ai-orchestrator:
        condition: service_healthy
      telegram-gateway:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(\"http://127.0.0.1:3000\").then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"']
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

