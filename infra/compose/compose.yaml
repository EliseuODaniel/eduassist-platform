      CLOUDFLARED_TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN:-}
      CLOUDFLARED_ALLOW_QUICK_TUNNEL: ${CLOUDFLARED_ALLOW_QUICK_TUNNEL:-true}
    command:
      - tunnel
      - --no-autoupdate
      - --url
      - ${CLOUDFLARED_TARGET_URL:-http://telegram-gateway:8000}
