name: ${COMPOSE_PROJECT_NAME:-eduassist-platform}

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17}
    container_name: eduassist-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eduassist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eduassist}
      POSTGRES_DB: ${POSTGRES_DB:-eduassist}
      POSTGRES_KEYCLOAK_DB: ${POSTGRES_KEYCLOAK_DB:-keycloak}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: eduassist-redis
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    container_name: eduassist-qdrant
    ports:
      - '${QDRANT_PORT:-6333}:6333'
      - '${QDRANT_GRPC_PORT:-6334}:6334'
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: eduassist-minio
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: eduassist-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123}; do sleep 2; done &&
      mc mb --ignore-existing local/${MINIO_BUCKET_DOCUMENTS:-documents}
      "
    restart: 'no'

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.1}
    container_name: eduassist-keycloak
    depends_on:
      postgres:
        condition: service_healthy
    command: ['start-dev', '--health-enabled=true', '--hostname=http://localhost:8080', '--import-realm']
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-eduassist}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-eduassist}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
    ports:
      - '8080:8080'
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
    healthcheck:
      test: ['CMD-SHELL', 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf "GET /realms/master HTTP/1.1\r\nHost: localhost\r\n\r\n" >&3 && grep -q "200" <&3']
      interval: 20s
      timeout: 10s
      retries: 15
    restart: unless-stopped

  opa:
    image: ${OPA_IMAGE:-openpolicyagent/opa:latest-static}
    container_name: eduassist-opa
    command: ['run', '--server', '--addr=0.0.0.0:8181', '/policies']
    ports:
      - '8181:8181'
    volumes:
      - ./opa:/policies:ro
    restart: unless-stopped

  otel-collector:
    profiles: ['observability']
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:0.122.1}
    container_name: eduassist-otel-collector
    command: ['--config=/etc/otelcol-contrib/otel-collector-config.yaml']
    ports:
      - '${OTEL_GRPC_PORT:-4317}:4317'
      - '${OTEL_HTTP_PORT:-4318}:4318'
      - '${OTEL_PROMETHEUS_PORT:-9464}:9464'
    volumes:
      - ./otel:/etc/otelcol-contrib:ro
    depends_on:
      tempo:
        condition: service_started
    restart: unless-stopped

  prometheus:
    profiles: ['observability']
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.3.1}
    container_name: eduassist-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      otel-collector:
        condition: service_started
    restart: unless-stopped

  tempo:
    profiles: ['observability']
    image: ${TEMPO_IMAGE:-grafana/tempo:2.7.2}
    user: '0:0'
    command: ['-config.file=/etc/tempo.yaml']
    ports:
      - '${TEMPO_PORT:-3200}:3200'
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    restart: unless-stopped

  loki:
    profiles: ['observability']
    image: ${LOKI_IMAGE:-grafana/loki:3.5.5}
    container_name: eduassist-loki
    command: ['-config.file=/etc/loki/config.yaml']
    ports:
      - '${LOKI_PORT:-3100}:3100'
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    restart: unless-stopped

  promtail:
    profiles: ['observability']
    image: ${PROMTAIL_IMAGE:-grafana/promtail:3.5.5}
    container_name: eduassist-promtail
    command: ['-config.file=/etc/promtail/config.yaml']
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped

  grafana:
    profiles: ['observability']
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.6.0}
    container_name: eduassist-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - '${GRAFANA_PORT:-3004}:3000'
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
    restart: unless-stopped

  api-core:
    env_file:
      - ../../.env
    build:
      context: ../..
      dockerfile: apps/api-core/Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-ghcr.io/astral-sh/uv:python3.12-bookworm-slim}
    container_name: eduassist-api-core
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env or shell}
      ALLOW_INSECURE_INTERNAL_API_TOKEN: ${ALLOW_INSECURE_INTERNAL_API_TOKEN:-false}
      DATABASE_URL: ${DATABASE_APP_URL:-postgresql://eduassist_app:eduassist_app@postgres:5432/eduassist}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPA_URL: ${OPA_URL:-http://opa:8181}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-eduassist}
      KEYCLOAK_ALLOWED_CLIENTS: ${KEYCLOAK_ALLOWED_CLIENTS:-eduassist-web,eduassist-cli}
      ALLOW_TEST_IDENTITY_OVERRIDES: ${ALLOW_TEST_IDENTITY_OVERRIDES:-false}
      TELEGRAM_LINK_TTL_MINUTES: ${TELEGRAM_LINK_TTL_MINUTES:-15}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-eduassist-platform}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    ports:
      - '${API_CORE_PORT:-8001}:8000'
    volumes:
      - ../../.env:/workspace/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/healthz\")"']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    restart: unless-stopped

  ai-orchestrator:
    env_file:
      - ../../.env
    build:
      context: ../..
      dockerfile: apps/ai-orchestrator/Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-ghcr.io/astral-sh/uv:python3.12-bookworm-slim}
    container_name: eduassist-ai-orchestrator
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env or shell}
      ALLOW_INSECURE_INTERNAL_API_TOKEN: ${ALLOW_INSECURE_INTERNAL_API_TOKEN:-false}
      CONTROL_PLANE_ALLOW_DIRECT_SERVING: ${CONTROL_PLANE_ALLOW_DIRECT_SERVING:-false}
      LLM_MODEL_PROFILE: ${LLM_MODEL_PROFILE:-gemma4e4b_local}
      LLM_PROVIDER: ${LLM_PROVIDER:-google}
      API_CORE_URL: http://api-core:8000
      OPENAI_API_MODE: ${OPENAI_API_MODE:-chat_completions}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      ANSWER_EXPERIENCE_OPENAI_API_MODE: ${ANSWER_EXPERIENCE_OPENAI_API_MODE:-}
      GOOGLE_API_BASE_URL: ${GOOGLE_API_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-2.5-flash}
      DATABASE_URL: ${DATABASE_APP_URL:-postgresql://eduassist_app:eduassist_app@postgres:5432/eduassist}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_DOCUMENTS_COLLECTION: ${QDRANT_DOCUMENTS_COLLECTION:-school_documents}
      DOCUMENT_EMBEDDING_MODEL: ${DOCUMENT_EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      HF_TOKEN: ${HF_TOKEN:-}
      XDG_CACHE_HOME: ${XDG_CACHE_HOME:-/workspace/.cache}
      HF_HOME: ${HF_HOME:-/workspace/.cache/huggingface}
      HF_HUB_CACHE: ${HF_HUB_CACHE:-/workspace/.cache/huggingface/hub}
      HUGGINGFACE_HUB_CACHE: ${HF_HUB_CACHE:-/workspace/.cache/huggingface/hub}
      FASTEMBED_CACHE_PATH: ${FASTEMBED_CACHE_PATH:-/workspace/.cache/fastembed}
      WARM_RETRIEVAL_ON_STARTUP: ${WARM_RETRIEVAL_ON_STARTUP:-true}
      GRAPH_RAG_ENABLED: ${GRAPH_RAG_ENABLED:-true}
      GRAPH_RAG_WORKSPACE: ${GRAPH_RAG_WORKSPACE:-/workspace/artifacts/graphrag/eduassist-public-benchmark}
      GRAPH_RAG_RESPONSE_TYPE: ${GRAPH_RAG_RESPONSE_TYPE:-List of 3-5 concise bullet points in Brazilian Portuguese}
      GRAPH_RAG_LOCAL_CHAT_API_BASE: ${GRAPH_RAG_LOCAL_CHAT_API_BASE:-http://host.docker.internal:18080/v1}
      GRAPH_RAG_LOCAL_EMBEDDING_API_BASE: ${GRAPH_RAG_LOCAL_EMBEDDING_API_BASE:-http://host.docker.internal:11435/v1}
      GRAPH_RAG_LOCAL_CHAT_API_KEY: ${GRAPH_RAG_LOCAL_CHAT_API_KEY:-llama.cpp}
      GRAPH_RAG_LOCAL_EMBEDDING_API_KEY: ${GRAPH_RAG_LOCAL_EMBEDDING_API_KEY:-ollama}
      FEATURE_FLAG_PRIMARY_ORCHESTRATION_STACK: ${FEATURE_FLAG_PRIMARY_ORCHESTRATION_STACK:-}
      LANGGRAPH_ORCHESTRATOR_URL: ${LANGGRAPH_ORCHESTRATOR_URL:-http://ai-orchestrator-langgraph:8000}
      PYTHON_FUNCTIONS_ORCHESTRATOR_URL: ${PYTHON_FUNCTIONS_ORCHESTRATOR_URL:-http://ai-orchestrator-python-functions:8000}
      LLAMAINDEX_ORCHESTRATOR_URL: ${LLAMAINDEX_ORCHESTRATOR_URL:-http://ai-orchestrator-llamaindex:8000}
      FEATURE_FLAG_TELEGRAM_DEBUG_TRACE_FOOTER_ENABLED: ${FEATURE_FLAG_TELEGRAM_DEBUG_TRACE_FOOTER_ENABLED:-true}
      LANGGRAPH_HITL_ENABLED: ${LANGGRAPH_HITL_ENABLED:-false}
      LANGGRAPH_HITL_DEFAULT_SLICES: ${LANGGRAPH_HITL_DEFAULT_SLICES:-support}
      LANGGRAPH_HITL_USER_TRAFFIC_ENABLED: ${LANGGRAPH_HITL_USER_TRAFFIC_ENABLED:-false}
      LANGGRAPH_HITL_USER_TRAFFIC_SLICES: ${LANGGRAPH_HITL_USER_TRAFFIC_SLICES:-support}
      SPECIALIST_SUPERVISOR_PILOT_URL: ${SPECIALIST_SUPERVISOR_PILOT_URL:-http://ai-orchestrator-specialist:8000}
      ORCHESTRATOR_EXPERIMENT_ENABLED: ${ORCHESTRATOR_EXPERIMENT_ENABLED:-false}
      ORCHESTRATOR_EXPERIMENT_PRIMARY_ENGINE: ${ORCHESTRATOR_EXPERIMENT_PRIMARY_ENGINE:-python_functions}
      ORCHESTRATOR_EXPERIMENT_SLICES: ${ORCHESTRATOR_EXPERIMENT_SLICES:-}
      ORCHESTRATOR_EXPERIMENT_ROLLOUT_PERCENT: ${ORCHESTRATOR_EXPERIMENT_ROLLOUT_PERCENT:-0}
      ORCHESTRATOR_EXPERIMENT_SLICE_ROLLOUTS: ${ORCHESTRATOR_EXPERIMENT_SLICE_ROLLOUTS:-}
      ORCHESTRATOR_EXPERIMENT_TELEGRAM_CHAT_ALLOWLIST: ${ORCHESTRATOR_EXPERIMENT_TELEGRAM_CHAT_ALLOWLIST:-}
      ORCHESTRATOR_EXPERIMENT_CONVERSATION_ALLOWLIST: ${ORCHESTRATOR_EXPERIMENT_CONVERSATION_ALLOWLIST:-}
      ORCHESTRATOR_EXPERIMENT_ALLOWLIST_SLICES: ${ORCHESTRATOR_EXPERIMENT_ALLOWLIST_SLICES:-}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-eduassist-platform}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    ports:
      - '${AI_ORCHESTRATOR_PORT:-8002}:8000'
    volumes:
      - ../../.env:/workspace/.env:ro
      - ../../artifacts/graphrag:/workspace/artifacts/graphrag
      - ../../data:/workspace/data:ro
      - model-cache:/workspace/.cache
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      ai-orchestrator-langgraph:
        condition: service_healthy
      ai-orchestrator-python-functions:
        condition: service_healthy
      ai-orchestrator-llamaindex:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/healthz\")"']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ai-orchestrator-langgraph:
    env_file:
      - ../../.env
    build:
      context: ../..
      dockerfile: apps/ai-orchestrator/Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-ghcr.io/astral-sh/uv:python3.12-bookworm-slim}
    container_name: eduassist-ai-orchestrator-langgraph
    command: ['uv', 'run', 'uvicorn', 'ai_orchestrator.main_langgraph:app', '--host', '0.0.0.0', '--port', '8000']
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env or shell}
      ALLOW_INSECURE_INTERNAL_API_TOKEN: ${ALLOW_INSECURE_INTERNAL_API_TOKEN:-false}
      LLM_MODEL_PROFILE: ${LLM_MODEL_PROFILE:-gemma4e4b_local}
      LLM_PROVIDER: ${LLM_PROVIDER:-google}
      API_CORE_URL: http://api-core:8000
      OPENAI_API_MODE: ${OPENAI_API_MODE:-chat_completions}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      ANSWER_EXPERIENCE_OPENAI_API_MODE: ${ANSWER_EXPERIENCE_OPENAI_API_MODE:-}
      GOOGLE_API_BASE_URL: ${GOOGLE_API_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-2.5-flash}
      DATABASE_URL: ${DATABASE_APP_URL:-postgresql://eduassist_app:eduassist_app@postgres:5432/eduassist}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_DOCUMENTS_COLLECTION: ${QDRANT_DOCUMENTS_COLLECTION:-school_documents}
      DOCUMENT_EMBEDDING_MODEL: ${DOCUMENT_EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      HF_TOKEN: ${HF_TOKEN:-}
      XDG_CACHE_HOME: ${XDG_CACHE_HOME:-/workspace/.cache}
      HF_HOME: ${HF_HOME:-/workspace/.cache/huggingface}
      HF_HUB_CACHE: ${HF_HUB_CACHE:-/workspace/.cache/huggingface/hub}
      HUGGINGFACE_HUB_CACHE: ${HF_HUB_CACHE:-/workspace/.cache/huggingface/hub}
      FASTEMBED_CACHE_PATH: ${FASTEMBED_CACHE_PATH:-/workspace/.cache/fastembed}
      WARM_RETRIEVAL_ON_STARTUP: ${WARM_RETRIEVAL_ON_STARTUP:-true}
      GRAPH_RAG_ENABLED: ${GRAPH_RAG_ENABLED:-true}
      GRAPH_RAG_WORKSPACE: ${GRAPH_RAG_WORKSPACE:-/workspace/artifacts/graphrag/eduassist-public-benchmark}
      GRAPH_RAG_RESPONSE_TYPE: ${GRAPH_RAG_RESPONSE_TYPE:-List of 3-5 concise bullet points in Brazilian Portuguese}
      GRAPH_RAG_LOCAL_CHAT_API_BASE: ${GRAPH_RAG_LOCAL_CHAT_API_BASE:-http://host.docker.internal:18080/v1}
      GRAPH_RAG_LOCAL_EMBEDDING_API_BASE: ${GRAPH_RAG_LOCAL_EMBEDDING_API_BASE:-http://host.docker.internal:11435/v1}
      GRAPH_RAG_LOCAL_CHAT_API_KEY: ${GRAPH_RAG_LOCAL_CHAT_API_KEY:-llama.cpp}
      GRAPH_RAG_LOCAL_EMBEDDING_API_KEY: ${GRAPH_RAG_LOCAL_EMBEDDING_API_KEY:-ollama}
      FEATURE_FLAG_PRIMARY_ORCHESTRATION_STACK: langgraph
      FEATURE_FLAG_TELEGRAM_DEBUG_TRACE_FOOTER_ENABLED: ${FEATURE_FLAG_TELEGRAM_DEBUG_TRACE_FOOTER_ENABLED:-true}
      STRICT_FRAMEWORK_ISOLATION_ENABLED: true
      ORCHESTRATOR_EXPERIMENT_ENABLED: false
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-eduassist-platform}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    ports:
      - '${AI_ORCHESTRATOR_LANGGRAPH_PORT:-8006}:8000'
    volumes:
      - ../../.env:/workspace/.env:ro
      - ../../artifacts/graphrag:/workspace/artifacts/graphrag
      - ../../data:/workspace/data:ro
      - model-cache:/workspace/.cache
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/healthz\")"']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ai-orchestrator-python-functions:
    env_file:
      - ../../.env
    build:
      context: ../..
      dockerfile: apps/ai-orchestrator/Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-ghcr.io/astral-sh/uv:python3.12-bookworm-slim}
    container_name: eduassist-ai-orchestrator-python-functions
    command: ['uv', 'run', 'uvicorn', 'ai_orchestrator.main_python_functions:app', '--host', '0.0.0.0', '--port', '8000']
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env or shell}
      ALLOW_INSECURE_INTERNAL_API_TOKEN: ${ALLOW_INSECURE_INTERNAL_API_TOKEN:-false}
      LLM_MODEL_PROFILE: ${LLM_MODEL_PROFILE:-gemma4e4b_local}
      LLM_PROVIDER: ${LLM_PROVIDER:-google}
      API_CORE_URL: http://api-core:8000
      OPENAI_API_MODE: ${OPENAI_API_MODE:-chat_completions}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      ANSWER_EXPERIENCE_OPENAI_API_MODE: ${ANSWER_EXPERIENCE_OPENAI_API_MODE:-}
      GOOGLE_API_BASE_URL: ${GOOGLE_API_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-2.5-flash}
      DATABASE_URL: ${DATABASE_APP_URL:-postgresql://eduassist_app:eduassist_app@postgres:5432/eduassist}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_DOCUMENTS_COLLECTION: ${QDRANT_DOCUMENTS_COLLECTION:-school_documents}
      DOCUMENT_EMBEDDING_MODEL: ${DOCUMENT_EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      HF_TOKEN: ${HF_TOKEN:-}
      XDG_CACHE_HOME: ${XDG_CACHE_HOME:-/workspace/.cache}
      HF_HOME: ${HF_HOME:-/workspace/.cache/huggingface}
      HF_HUB_CACHE: ${HF_HUB_CACHE:-/workspace/.cache/huggingface/hub}
      HUGGINGFACE_HUB_CACHE: ${HF_HUB_CACHE:-/workspace/.cache/huggingface/hub}
