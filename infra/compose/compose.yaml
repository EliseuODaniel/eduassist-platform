name: ${COMPOSE_PROJECT_NAME:-eduassist-platform}

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17}
    container_name: eduassist-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eduassist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eduassist}
      POSTGRES_DB: ${POSTGRES_DB:-eduassist}
      POSTGRES_KEYCLOAK_DB: ${POSTGRES_KEYCLOAK_DB:-keycloak}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: eduassist-redis
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    container_name: eduassist-qdrant
    ports:
      - '${QDRANT_PORT:-6333}:6333'
      - '${QDRANT_GRPC_PORT:-6334}:6334'
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: eduassist-minio
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: eduassist-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123}; do sleep 2; done &&
      mc mb --ignore-existing local/${MINIO_BUCKET_DOCUMENTS:-documents}
      "
    restart: 'no'

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.1}
    container_name: eduassist-keycloak
    depends_on:
      postgres:
        condition: service_healthy
    command: ['start-dev', '--health-enabled=true', '--hostname-strict=false', '--import-realm']
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-eduassist}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-eduassist}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
    ports:
      - '8080:8080'
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
    healthcheck:
      test: ['CMD-SHELL', 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf "GET /realms/master HTTP/1.1\r\nHost: localhost\r\n\r\n" >&3 && grep -q "200" <&3']
      interval: 20s
      timeout: 10s
      retries: 15
    restart: unless-stopped

  opa:
    image: ${OPA_IMAGE:-openpolicyagent/opa:latest-static}
    container_name: eduassist-opa
    command: ['run', '--server', '--addr=0.0.0.0:8181', '/policies']
    ports:
      - '8181:8181'
    volumes:
      - ./opa:/policies:ro
    restart: unless-stopped

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:0.122.1}
    container_name: eduassist-otel-collector
    command: ['--config=/etc/otelcol-contrib/config.yaml']
    ports:
      - '${OTEL_GRPC_PORT:-4317}:4317'
      - '${OTEL_HTTP_PORT:-4318}:4318'
      - '${OTEL_PROMETHEUS_PORT:-9464}:9464'
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      tempo:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.3.1}
    container_name: eduassist-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      otel-collector:
        condition: service_started
    restart: unless-stopped

  tempo:
    image: ${TEMPO_IMAGE:-grafana/tempo:2.7.2}
    user: '0:0'
    command: ['-config.file=/etc/tempo.yaml']
    ports:
      - '${TEMPO_PORT:-3200}:3200'
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    restart: unless-stopped

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.5.5}
    container_name: eduassist-loki
    command: ['-config.file=/etc/loki/config.yaml']
    ports:
      - '${LOKI_PORT:-3100}:3100'
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    restart: unless-stopped

  promtail:
    image: ${PROMTAIL_IMAGE:-grafana/promtail:3.5.5}
    container_name: eduassist-promtail
    command: ['-config.file=/etc/promtail/config.yaml']
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.6.0}
    container_name: eduassist-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - '${GRAFANA_PORT:-3004}:3000'
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
    restart: unless-stopped

  api-core:
    build:
      context: ../..
      dockerfile: apps/api-core/Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-ghcr.io/astral-sh/uv:python3.12-bookworm-slim}
    container_name: eduassist-api-core
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8000
      DATABASE_URL: ${DATABASE_URL:-postgresql://eduassist:eduassist@postgres:5432/eduassist}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPA_URL: ${OPA_URL:-http://opa:8181}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-eduassist}
      KEYCLOAK_ALLOWED_CLIENTS: ${KEYCLOAK_ALLOWED_CLIENTS:-eduassist-web,eduassist-cli}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      ALLOW_TEST_IDENTITY_OVERRIDES: ${ALLOW_TEST_IDENTITY_OVERRIDES:-true}
      TELEGRAM_LINK_TTL_MINUTES: ${TELEGRAM_LINK_TTL_MINUTES:-15}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-eduassist-platform}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    ports:
      - '${API_CORE_PORT:-8001}:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_started
      otel-collector:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/healthz\")"']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ai-orchestrator:
    build:
      context: ../..
      dockerfile: apps/ai-orchestrator/Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-ghcr.io/astral-sh/uv:python3.12-bookworm-slim}
    container_name: eduassist-ai-orchestrator
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8000
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      API_CORE_URL: http://api-core:8000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-2.5-pro}
      DATABASE_URL: ${DATABASE_URL:-postgresql://eduassist:eduassist@postgres:5432/eduassist}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_DOCUMENTS_COLLECTION: ${QDRANT_DOCUMENTS_COLLECTION:-school_documents}
      DOCUMENT_EMBEDDING_MODEL: ${DOCUMENT_EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      GRAPH_RAG_ENABLED: ${GRAPH_RAG_ENABLED:-false}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-eduassist-platform}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    ports:
      - '${AI_ORCHESTRATOR_PORT:-8002}:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      otel-collector:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/healthz\")"']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  telegram-gateway:
    build:
      context: ../..
      dockerfile: apps/telegram-gateway/Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-ghcr.io/astral-sh/uv:python3.12-bookworm-slim}
    container_name: eduassist-telegram-gateway
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: 8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-change-me}
      API_CORE_URL: http://api-core:8000
      AI_ORCHESTRATOR_URL: http://ai-orchestrator:8000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-eduassist-platform}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    ports:
      - '${TELEGRAM_GATEWAY_PORT:-8003}:8000'
    depends_on:
      api-core:
        condition: service_healthy
      ai-orchestrator:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/healthz\")"']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-ghcr.io/astral-sh/uv:python3.12-bookworm-slim}
    container_name: eduassist-worker
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql://eduassist:eduassist@postgres:5432/eduassist}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET_DOCUMENTS: ${MINIO_BUCKET_DOCUMENTS:-documents}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_DOCUMENTS_COLLECTION: ${QDRANT_DOCUMENTS_COLLECTION:-school_documents}
      DOCUMENT_PIPELINE_BACKEND: ${DOCUMENT_PIPELINE_BACKEND:-markdown}
      DOCUMENT_CORPUS_DIR: ${DOCUMENT_CORPUS_DIR:-/workspace/data/corpus}
      DOCUMENT_EMBEDDING_MODEL: ${DOCUMENT_EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      WORKER_BOOTSTRAP_DOCUMENTS: ${WORKER_BOOTSTRAP_DOCUMENTS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'test -f /tmp/worker-ready']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  admin-web:
    build:
      context: ../..
      dockerfile: apps/admin-web/Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:24-bookworm-slim}
    container_name: eduassist-admin-web
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: '1'
      PORT: 3000
      API_CORE_URL: http://api-core:8000
      AI_ORCHESTRATOR_URL: http://ai-orchestrator:8000
      TELEGRAM_GATEWAY_URL: http://telegram-gateway:8000
      KEYCLOAK_HOST: ${KEYCLOAK_HOST:-http://keycloak:8080}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-eduassist}
      KEYCLOAK_WEB_CLIENT_ID: ${KEYCLOAK_WEB_CLIENT_ID:-eduassist-web}
      ADMIN_WEB_PUBLIC_URL: ${ADMIN_WEB_PUBLIC_URL:-http://localhost:3000}
      OPA_URL: ${OPA_URL:-http://opa:8181}
    ports:
      - '${ADMIN_WEB_PORT:-3000}:3000'
    depends_on:
      api-core:
        condition: service_healthy
      ai-orchestrator:
        condition: service_healthy
      telegram-gateway:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(\"http://127.0.0.1:3000\").then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"']
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
  qdrant-data:
  redis-data:
  minio-data:
  tempo-data:
  loki-data:
  grafana-data:
  prometheus-data:
