[project]
name = "eduassist-semantic-ingress"
version = "0.1.0"
description = "Shared semantic ingress classification contract for EduAssist runtimes."
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.28.0",
  "openai>=1.109.1",
  "pydantic>=2.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eduassist_semantic_ingress"]
